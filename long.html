<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>long</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/long.css" />
</head>
<body>
  <div class="bg"></div>
  <div class="grain"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <main class="long-page">
    <a class="back-link" href="letter.html">← back</a>

    <div class="top-note">entry / distance</div>

    <section class="hero" id="hero">
      <div class="floating-word-wrap">
        <button class="long-word" id="longWord" type="button">
          <span class="main-word">long</span>
          <span class="sub-word">click to open</span>
        </button>
      </div>

      <div class="tiny-text tiny-1">distance</div>
      <div class="tiny-text tiny-2">not yet</div>
      <div class="tiny-text tiny-3">almost</div>
      <div class="tiny-text tiny-4">reaching</div>

      <div class="line horizon line-1"></div>
      <div class="line horizon line-2"></div>
      <div class="line horizon line-3"></div>
    </section>

    <section class="bottom-text">
      <p class="poem-line active">longing stretches space.</p>
      <p class="poem-line">what is far becomes larger in feeling.</p>
      <p class="poem-line">arrival stays just beyond the frame.</p>
    </section>

    <section class="overlay" id="overlay" aria-hidden="true">
      <div class="overlay-inner">
        <img class="long-img img-1" src="./long1.png" alt="long image 1" />
        <img class="long-img img-2" src="./long2.png" alt="long image 2" />
        <div class="overlay-caption">click anywhere to return</div>
      </div>
    </section>
  </main>

  <script src="./js/long.js"></script>
</body>
</html>
